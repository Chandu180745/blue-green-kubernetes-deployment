apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue-deployment
  labels:
    app: blue-green-app
    version: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blue-green-app
      version: blue
  template:
    metadata:
      labels:
        app: blue-green-app
        version: blue
    spec:
      containers:
      - name: app
        image: yeschandu78/blue-green-app:blue
        ports:
        - containerPort: 8080
        env:
        - name: VERSION
          value: "blue"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
